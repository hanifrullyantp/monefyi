<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0F1117">
  <title>Offline - Monefyi</title>
  <link rel="icon" href="./icons/monefyi-logo.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(180deg, #0F1117 0%, #131826 100%);
      color: white;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }
    .card { max-width: 400px; text-align: center; }
    .icon-container {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 24px; font-size: 15px; }
    button {
      padding: 14px 32px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:active { transform: scale(0.95); }
    .info {
      margin-top: 24px;
      padding: 16px;
      background: rgba(16,185,129,0.08);
      border-radius: 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      border-left: 3px solid #10b981;
      text-align: left;
      line-height: 1.6;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="#10b981" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z"/>
      </svg>
    </div>
    <h1>Kamu Sedang Offline</h1>
    <p>Koneksi terputus, tapi data kamu aman di device. Fitur utama tetap jalan.</p>
    <button type="button" onclick="location.reload()">Coba Lagi</button>
    <div class="info">
      Perubahan yang kamu buat akan otomatis tersinkron saat online kembali.
    </div>
    <div class="status" id="status">Status: <span>Offline</span></div>
  </div>
  <script>
    const statusEl = document.querySelector('#status span');
    function updateStatus() {
      const online = navigator.onLine;
      statusEl.textContent = online ? 'Online, muat ulang...' : 'Offline';
      if (online) setTimeout(function () { location.reload(); }, 500);
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
