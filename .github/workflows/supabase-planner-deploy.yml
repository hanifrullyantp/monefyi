# Run from GitHub → Actions → "Supabase Planner migrate & deploy" → Run workflow.
# Required repository secrets:
#   SUPABASE_ACCESS_TOKEN  — https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   — Project Settings → General → Reference ID
# Optional:
#   SUPABASE_ORPHAN_MIGRATION_VERSIONS — space-separated migration versions to `repair --reverted` (fallback after fetch)

name: Supabase Planner migrate & deploy

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: my-supabase-project

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      # Pull migration SQL files that exist on remote history but not in this repo checkout.
      - name: Fetch remote migrations missing locally
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true
        run: supabase migration fetch --linked --yes

      # Fallback: remote-only version rows with no retrievable file (repair reverted does not DROP tables).
      - name: Repair orphan remote migration markers
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_ORPHAN_MIGRATION_VERSIONS: ${{ secrets.SUPABASE_ORPHAN_MIGRATION_VERSIONS }}
        continue-on-error: true
        run: |
          VERSIONS="${SUPABASE_ORPHAN_MIGRATION_VERSIONS:-20260507151500 20260507162500}"
          for v in $VERSIONS; do
            [ -z "${v// }" ] && continue
            echo "Repair reverted $v"
            supabase migration repair --status reverted --linked "$v" || true
          done

      - name: Migration list (debug)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true
        run: supabase migration list --linked

      - name: Push database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --yes

      - name: Deploy Planner Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy planner-analyze
          supabase functions deploy planner-parse-command
