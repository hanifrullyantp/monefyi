# Run from GitHub → Actions → "Supabase Planner migrate & deploy" → Run workflow.
# Required repository secrets:
#   SUPABASE_ACCESS_TOKEN  — https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   — Project Settings → General → Reference ID
#   ADMIN_TEST_PASSWORD    — super admin password for edge smoke (optional; skips admin tests if unset)

name: Supabase Planner migrate & deploy

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: my-supabase-project

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push

      - name: Lint database schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db lint

      - name: RLS smoke test
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          RLS_TEST_EMAIL: owner-onboard@test.monefyi.app
          RLS_TEST_PASSWORD: TestOnboard2026!
        run: |
          cd ..
          ./scripts/rls-smoke-test.sh

      - name: Deploy Planner Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          NO_VERIFY_JWT="auth-send-email monefyi-landing-config"
          for fn in \
            auth-send-email \
            planner-analyze \
            planner-parse-command \
            planner-create-owner-org \
            planner-validate-invitation \
            planner-create-invitation \
            planner-accept-invitation \
            planner-send-invitation-email \
            planner-revoke-invitation \
            planner-submit-join-request \
            planner-approve-join-request \
            planner-reject-join-request \
            planner-change-member-role \
            planner-remove-member \
            planner-transfer-ownership \
            planner-search-companies \
            planner-try-domain-join \
            planner-direct-create-member \
            monefyi-admin-users \
            monefyi-admin-update-user \
            monefyi-admin-app-config \
            monefyi-admin-platform-stats \
            monefyi-admin-company-types \
            monefyi-user-account \
            monefyi-landing-config
          do
            echo "Deploying $fn..."
            extra=""
            for nv in $NO_VERIFY_JWT; do
              if [ "$fn" = "$nv" ]; then extra="--no-verify-jwt"; break; fi
            done
            supabase functions deploy "$fn" $extra
          done

      - name: Edge function smoke test
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ADMIN_TEST_EMAIL: hanif.rullyant@gmail.com
          ADMIN_TEST_PASSWORD: ${{ secrets.ADMIN_TEST_PASSWORD }}
          RLS_TEST_EMAIL: owner-onboard@test.monefyi.app
          RLS_TEST_PASSWORD: TestOnboard2026!
        run: |
          cd ..
          ./scripts/planner-edge-smoke-test.sh
